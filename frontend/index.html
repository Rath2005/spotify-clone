<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Spotify Clone - Login or Register to stream music">
    <title>Spotify Clone - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Circular+Std:wght@400;500;700;900&family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-brand">
            <svg class="logo" viewBox="0 0 24 24" fill="#1DB954">
                <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/>
            </svg>
            <h1 class="brand-name">Spotify</h1>
        </div>

        <div class="auth-card">
            <!-- Tabs -->
            <div class="auth-tabs">
                <button id="login-tab" class="tab-btn active" onclick="switchTab('login')">Log In</button>
                <button id="register-tab" class="tab-btn" onclick="switchTab('register')">Sign Up</button>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="auth-form" onsubmit="handleLogin(event)">
                <h2 class="form-title">Log in to Spotify</h2>
                <div class="form-group">
                    <label for="login-email">Email address</label>
                    <input type="email" id="login-email" placeholder="Email address" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="login-password" placeholder="Password" required autocomplete="current-password">
                        <button type="button" class="toggle-pw" onclick="togglePassword('login-password', this)">👁</button>
                    </div>
                </div>
                <div id="login-error" class="error-msg hidden"></div>
                <button type="submit" id="login-btn" class="btn-primary">
                    <span class="btn-text">LOG IN</span>
                    <span class="btn-loader hidden">●●●</span>
                </button>
            </form>

            <!-- Register Form -->
            <form id="register-form" class="auth-form hidden" onsubmit="handleRegister(event)">
                <h2 class="form-title">Sign up for free</h2>
                <div class="form-group">
                    <label for="reg-name">What's your name?</label>
                    <input type="text" id="reg-name" placeholder="Enter your name" required autocomplete="name">
                </div>
                <div class="form-group">
                    <label for="reg-email">What's your email?</label>
                    <input type="email" id="reg-email" placeholder="Enter your email" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="reg-password">Create a password</label>
                    <div class="password-wrapper">
                        <input type="password" id="reg-password" placeholder="Create a password (min. 6 characters)" required>
                        <button type="button" class="toggle-pw" onclick="togglePassword('reg-password', this)">👁</button>
                    </div>
                </div>
                <div id="register-error" class="error-msg hidden"></div>
                <button type="submit" id="register-btn" class="btn-primary">
                    <span class="btn-text">SIGN UP</span>
                    <span class="btn-loader hidden">●●●</span>
                </button>
            </form>

            <div class="auth-divider">
                <span id="switch-text">Don't have an account? <a href="#" onclick="switchTab('register')">Sign up</a></span>
            </div>
        </div>
    </div>
    <script src="js/auth.js"></script>
</body>
</html>
